name: "Service: Node.js"

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Display name for the Node.js service"
      service-path:
        required: false
        type: string
        default: "."
        description: "Directory that contains the service"
      node-version:
        required: false
        type: string
        default: "24"
        description: "Node.js version"
      package-manager:
        required: false
        type: string
        default: "auto"
        description: "Package manager override (auto|npm|yarn|pnpm)"
      install-command:
        required: false
        type: string
        default: ""
        description: "Optional install command override"
      lint-command:
        required: false
        type: string
        default: "npm run lint"
        description: "Lint command"
      format-command:
        required: false
        type: string
        default: ""
        description: "Format validation command"
      typecheck-command:
        required: false
        type: string
        default: "npx tsc --noEmit"
        description: "Type-check command"
      unit-test-command:
        required: false
        type: string
        default: "npm test -- --runInBand --coverage"
        description: "Unit test command"
      integration-test-command:
        required: false
        type: string
        default: ""
        description: "Integration test command"
      contract-test-command:
        required: false
        type: string
        default: ""
        description: "Contract test command"
      e2e-test-command:
        required: false
        type: string
        default: ""
        description: "End-to-end test command"
      build-command:
        required: false
        type: string
        default: "npm run build"
        description: "Build command"
      build-output-path:
        required: false
        type: string
        default: "dist"
        description: "Build output folder or file"
      coverage-threshold:
        required: false
        type: number
        default: 80
        description: "Minimum line coverage percentage"
      enable-dependency-review:
        required: false
        type: boolean
        default: false
        description: "Run GitHub dependency review on pull requests"
      enable-audit:
        required: false
        type: boolean
        default: true
        description: "Run dependency audit"
      custom-audit-command:
        required: false
        type: string
        default: ""
        description: "Optional audit command override"
      enable-license-check:
        required: false
        type: boolean
        default: true
        description: "Run license compliance checks"
      enable-attestation:
        required: false
        type: boolean
        default: false
        description: "Generate build provenance attestation"
      uat-deploy-command:
        required: false
        type: string
        default: ""
        description: "Optional command to deploy the service to UAT"
      uat-command:
        required: false
        type: string
        default: ""
        description: "Optional UAT validation command"
      uat-base-url:
        required: false
        type: string
        default: ""
        description: "Base URL for UAT validation"
      uat-healthcheck-url:
        required: false
        type: string
        default: ""
        description: "Optional healthcheck URL for UAT validation"
      require-uat-approval:
        required: false
        type: boolean
        default: true
        description: "Require UAT environment approval"
      require-production-approval:
        required: false
        type: boolean
        default: false
        description: "Require production approval gate"
      production-app-type:
        required: false
        type: string
        default: "api"
        description: "Application type passed to the production gate"
      production-staging-url:
        required: false
        type: string
        default: ""
        description: "Optional URL re-used by the production gate"

permissions:
  contents: read

jobs:
  quality:
    name: "Node.js Quality"
    uses: ./.github/workflows/reusable-javascript-quality.yml
    with:
      service-name: ${{ inputs.service-name }}
      service-path: ${{ inputs.service-path }}
      stack-name: nodejs
      node-version: ${{ inputs.node-version }}
      package-manager: ${{ inputs.package-manager }}
      install-command: ${{ inputs.install-command }}
      lint-command: ${{ inputs.lint-command }}
      format-command: ${{ inputs.format-command }}
      typecheck-command: ${{ inputs.typecheck-command }}
      unit-test-command: ${{ inputs.unit-test-command }}
      integration-test-command: ${{ inputs.integration-test-command }}
      contract-test-command: ${{ inputs.contract-test-command }}
      e2e-test-command: ${{ inputs.e2e-test-command }}
      build-command: ${{ inputs.build-command }}
      build-output-path: ${{ inputs.build-output-path }}
      coverage-threshold: ${{ inputs.coverage-threshold }}
      enable-dependency-review: ${{ inputs.enable-dependency-review }}
      enable-audit: ${{ inputs.enable-audit }}
      custom-audit-command: ${{ inputs.custom-audit-command }}
      enable-license-check: ${{ inputs.enable-license-check }}
      enable-attestation: ${{ inputs.enable-attestation }}
    secrets: inherit

  uat:
    name: "Node.js UAT"
    if: ${{ inputs.uat-deploy-command != '' || inputs.uat-command != '' || inputs.uat-base-url != '' || inputs.uat-healthcheck-url != '' }}
    needs: [quality]
    uses: ./.github/workflows/reusable-service-uat.yml
    with:
      service-name: ${{ inputs.service-name }}
      service-path: ${{ inputs.service-path }}
      node-version: ${{ inputs.node-version }}
      package-manager: ${{ inputs.package-manager }}
      install-command: ${{ inputs.install-command }}
      require-approval: ${{ inputs.require-uat-approval }}
      uat-deploy-command: ${{ inputs.uat-deploy-command }}
      uat-command: ${{ inputs.uat-command }}
      uat-base-url: ${{ inputs.uat-base-url }}
      uat-healthcheck-url: ${{ inputs.uat-healthcheck-url }}
    secrets: inherit

  production-gate:
    name: "Node.js Production Gate"
    if: >-
      always() &&
      inputs.require-production-approval &&
      needs.quality.result == 'success' &&
      (needs.uat.result == 'success' || needs.uat.result == 'skipped')
    needs:
      - quality
      - uat
    uses: ./.github/workflows/production-gate.yml
    with:
      system-dir: ${{ inputs.service-path }}
      app-type: ${{ inputs.production-app-type }}
      staging-url: ${{ inputs.production-staging-url != '' && inputs.production-staging-url || inputs.uat-base-url }}
      require-approval: true
