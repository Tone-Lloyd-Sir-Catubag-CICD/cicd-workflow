      ios-build-command: ${{ inputs.ios-build-command }}
      maestro-test-command: ${{ inputs.maestro-ios-test-command }}
      skip-build: ${{ needs.ios-build.result == 'success' }}
      build-artifact-name: ${{ needs.ios-build.result == 'success' && format('{0}-ios-maestro-build', inputs.system-name) || '' }}


